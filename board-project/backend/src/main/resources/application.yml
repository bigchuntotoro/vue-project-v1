server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/board_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: totoro

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.board.domain
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL

logging:
  level:
    root: info
    org.springframework.web: debug              # 💡 스프링 웹 요청/응답 상세 흐름 파악
    org.springframework.web.servlet: debug      # 💡 컨트롤러 매핑 및 예외 추적
    com.example.board.mapper: trace             # 🎯 작성하신 Mapper가 실행하는 SQL 쿼리와 파라미터 값 출력
    org.mybatis: trace                          # 🎯 MyBatis 내부 쿼리 실행 디버깅