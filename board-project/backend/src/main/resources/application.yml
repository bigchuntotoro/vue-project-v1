server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/board_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: board_user
    password: board_pass

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.board.domain
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL

logging:
  level:
    com.example.board.mapper: TRACE
